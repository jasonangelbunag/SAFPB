<!DOCTYPE html>
<html>
<head>
  <title>Created by: Engr. Jason Angel Buñag</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="utf-8">

  <!-- Load Leaflet code library: see https://leafletjs.com/download.html -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.2/dist/leaflet.css" integrity="sha256-sA+zWATbFveLLNqWO2gtiw3HL/lh1giY/Inf1BJ0z14=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.2/dist/leaflet.js" integrity="sha256-o9N1jGDZrf5tS+Ft4gbIK7mYMipq9lqpVJ91xHSyKhg=" crossorigin=""></script>

  <!-- Position the map and title with Cascading Style Sheet (CSS) -->
  <style>
  body { margin:0; padding:0; }
  #map { position: absolute; top:0; bottom:0; right:0; left:0; }
  #map-title { position: relative; margin-top: 10px; margin-left: 50px; float: left; background: white; border: 2px solid rgba(0,0,0,0.2); padding: 6px 8px; font-family: Helvetica; font-weight: bold; font-size: 24px; z-index: 800; }
  </style>
</head>
<body>

  <!-- Display the map and title with HTML division tags  -->
  <div id="map-title">PROPOSED 75 LGUs FOR SAFPB</div>
  <div id="map"></div>

  <!-- Create the interactive map content with JavaScript (.js) -->
  <script>

  /* Set up the initial map center and zoom level */
  var map = L.map('map', {
    center: [11.972190312452504, 121.92327368115949], // EDIT coordinates to re-center map
    zoom: 6,  // EDIT from 1 (zoomed out) to 18 (zoomed in)
    scrollWheelZoom: true
  });

  /* display basemap tiles -- see others at https://leaflet-extras.github.io/leaflet-providers/preview/ */
  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://osm.org/copyright">\
        OpenStreetMap</a> contributors, &copy;\
        <a href="https://carto.com/attribution">CARTO</a>'
  }).addTo(map);

  /* Display a point marker with pop-up text */
  L.marker([18.145824800180616, 121.28897523738468]).addTo(map) // EDIT marker coordinates
  .bindPopup("CAR | APAYAO | PUDTOL"); // EDIT pop-up text message
    
  /* Display a point marker with pop-up text */
  L.marker([16.97267615543293, 121.22149311078637]).addTo(map) // EDIT marker coordinates
  .bindPopup("CAR | IFUGAO | MAYOYAO"); // EDIT pop-up text message

  /* Display a point marker with pop-up text */
  L.marker([18.461580162040978, 120.90157769076356]).addTo(map) // EDIT marker coordinates
  .bindPopup("REGION I | ILOCOS NORTE | ADAMS"); // EDIT pop-up text message

  /* Display a point marker with pop-up text */
  L.marker([18.232815668935043, 120.88751417969051]).addTo(map) // EDIT marker coordinates
  .bindPopup("REGION I | ILOCOS NORTE | CARASI"); // EDIT pop-up text message

  /* Display a point marker with pop-up text */
  L.marker([18.522173303730252, 120.80869562585951]).addTo(map) // EDIT marker coordinates
  .bindPopup("REGION I | ILOCOS NORTE | DUMALNEG"); // EDIT pop-up text message

  /* Display a point marker with pop-up text */
  L.marker([16.989884139620266, 120.73478298962873]).addTo(map) // EDIT marker coordinates
  .bindPopup("REGION I | ILOCOS SUR | CERVANTES"); // EDIT pop-up text message

  /* Display a point marker with pop-up text */
  L.marker([16.966048714810864, 120.56069360443593]).addTo(map) // EDIT marker coordinates
  .bindPopup("REGION I | ILOCOS SUR | SUYO"); // EDIT pop-up text message

  /* Display a point marker with pop-up text */
  L.marker([16.438296899585165, 120.35454685599214]).addTo(map) // EDIT marker coordinates
  .bindPopup("REGION I | LA UNION | CABA"); // EDIT pop-up text message

  /* Display a point marker with pop-up text */
  L.marker([16.06044675822475, 119.86065163296466]).addTo(map) // EDIT marker coordinates
  .bindPopup("<b>REGION I | PANGASINAN | BURGOS</b><br> sample"); // EDIT pop-up text message


    
  </script>
</body>
</html>
